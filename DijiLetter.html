<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diji Letter</title>
    <script>
        function generateBouquet() {
            const flowers = document.getElementById('flowers').value;
            const message = document.getElementById('message').value;
            const result = `Your bouquet with these flowers: ${flowers} and message: ${message}`;
            document.getElementById('result').innerText = result;
        }
    </script>
</head>
<body>
    <h1>Diji Letter</h1>
    <div>
        <input type="text" id="flowers" placeholder="Enter flowers" />
        <input type="text" id="message" placeholder="Enter message" />
        <button onClick="generateBouquet()">Generate Bouquet</button>
    </div>
    <div id="result"></div>
    <script>
        // URL parameter sharing functionality
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('flowers') && params.has('message')) {
                document.getElementById('flowers').value = params.get('flowers');
                document.getElementById('message').value = params.get('message');
                generateBouquet();
            }
        };
    </script>
</body>
</html>
