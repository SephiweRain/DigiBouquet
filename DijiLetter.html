<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>digibouquet' — beautiful flowers delivered digitally</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { 
      background: linear-gradient(to bottom right, #fff5f9, #fffaf0, #fef9f5); 
      font-family: 'Poppins', sans-serif; 
    }
    h1 { font-family: 'Great Vibes', cursive; font-size: 5rem; color: #ff69b4; }
    .bouquet-area {
      position: relative;
      width: 360px;
      height: 420px;
      margin: 0 auto;
      background: #fffdf7 url('https://www.transparenttextures.com/patterns/old-paper.png') repeat;
      border-radius: 40% 40% 30% 30% / 60% 60% 40% 40%;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15), inset 0 10px 25px rgba(255,255,255,0.6);
      overflow: hidden;
    }
    .greenery { position: absolute; bottom: 0; left: 0; width: 100%; height: 45%; pointer-events: none; opacity: 0.85; }
    .flower-img { 
      position: absolute; 
      width: 110px; 
      height: 110px; 
      object-fit: contain; 
      filter: drop-shadow(0 10px 6px rgba(0,0,0,0.25)); 
    }
    .flower-picker { 
      display: flex; 
      overflow-x: auto; 
      gap: 1.8rem; 
      padding: 1.5rem 0; 
      scrollbar-width: thin; 
      scrollbar-color: #ffb6c1 #fff5f9; 
    }
    .flower-picker::-webkit-scrollbar { height: 8px; }
    .flower-picker::-webkit-scrollbar-thumb { background: #ffb6c1; border-radius: 4px; }
    .selected { transform: scale(1.12); border: 3px solid #ff69b4; border-radius: 50%; padding: 6px; background: rgba(255,105,180,0.1); }
    .envelope { position: relative; width: 100%; max-width: 500px; margin: 20px auto; }
    .envelope-outer { background: #f5e6d3; border: 2px solid #d4a574; padding: 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
    .envelope-outer:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .envelope-outer.opened { background: #fff9f0; }
    .envelope-flap { background: linear-gradient(135deg, #ff69b4, #ff1493); height: 40px; margin: -20px -20px 20px -20px; border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; transition: 0.3s; }
    .envelope.opened .envelope-flap { transform: rotateX(180deg); }
    .card-content { display: none; background: #fffaf0; padding: 20px; border-radius: 4px; }
    .envelope.opened .card-content { display: block; animation: slideUp 0.5s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .card-recipient { font-size: 18px; font-weight: bold; color: #ff69b4; margin-bottom: 10px; }
    .card-message { font-size: 14px; color: #333; line-height: 1.6; font-style: italic; }
    .playlist-section { background: #f9f0ff; padding: 15px; border-radius: 8px; margin-top: 15px; }
    .playlist-embed { width: 100%; height: 380px; margin-top: 10px; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

  <header class="text-center mb-12">
    <h1 class="mb-1">digibouquet'</h1>
    <p class="text-xl text-pink-600 font-medium">beautiful flowers delivered digitally</p>
    <p class="text-sm text-gray-600 mt-2">made with love by @theyluvphiiwee ♥</p>
  </header>

  <main class="w-full max-w-4xl bg-white/60 backdrop-blur-md rounded-3xl shadow-2xl p-8 md:p-12">

    <section class="text-center mb-10">
      <h2 class="text-4xl font-bold text-pink-700 mb-3" style="font-family: 'Playfair Display', serif;">PICK 6 TO 10 BLOOMS</h2>
      <p class="text-gray-600">Selected: <span id="selected-count">0</span></p>
    </section>

    <div id="flower-picker" class="flower-picker mx-auto justify-center">
      <!-- Flowers injected here -->
    </div>

    <section class="my-12 text-center">
      <h3 class="text-2xl font-semibold text-pink-700 mb-6">Your Bouquet</h3>
      <div id="bouquet-area" class="bouquet-area">
        <img id="greenery-layer" class="greenery" src="" alt="greenery">
        <div id="flowers-container" class="relative w-full h-full"></div>
      </div>

      <div class="mt-6 flex justify-center gap-6">
        <button onclick="changeGreenery()" class="px-6 py-3 bg-pink-100 text-pink-700 rounded-xl font-medium hover:bg-pink-200 transition">
          CHANGE GREENERY
        </button>
      </div>
    </section>

    <section class="space-y-8 mt-10">
      <div class="bg-pink-50 p-6 rounded-2xl">
        <label class="flex items-center gap-3 text-lg font-medium mb-3">
          <input type="checkbox" id="include-playlist" class="w-5 h-5 accent-pink-500">
          Add playlist (Spotify / Apple Music)
        </label>
        <div id="playlist-options" class="hidden mt-4 space-y-4">
          <input id="playlist-url" type="url" placeholder="Paste playlist link..." class="w-full p-4 rounded-xl border border-pink-200">
          <input id="playlist-cover" type="url" placeholder="Cover image URL (optional)" class="w-full p-4 rounded-xl border border-pink-200">
        </div>
      </div>

      <div class="bg-amber-50 p-6 rounded-2xl">
        <label class="flex items-center gap-3 text-lg font-medium mb-3">
          <input type="checkbox" id="include-card" class="w-5 h-5 accent-pink-500" checked>
          Add card message
        </label>
        <div id="card-options" class="mt-4 space-y-4">
          <input id="recipient" type="text" placeholder="To: Name ♡" class="w-full p-4 rounded-xl border border-amber-200">
          <textarea id="message" rows="3" placeholder="Your message..." class="w-full p-4 rounded-xl border border-amber-200 resize-none"></textarea>
        </div>
      </div>

      <button id="generate" onclick="generateBouquet()" class="w-full py-6 bg-gradient-to-r from-pink-500 to-purple-500 text-white text-xl font-bold rounded-2xl shadow-lg hover:brightness-110 transition disabled:opacity-50" disabled>
        Create & Get Share Link ✨
      </button>
    </section>

    <section id="preview" class="hidden mt-12 text-center">
      <h2 class="text-3xl font-bold text-pink-700 mb-6">Your Bouquet is Ready!</h2>
      <div id="preview-bouquet" class="bouquet-area mx-auto mb-8"></div>

      <div id="envelope-container" class="mb-8"></div>

      <div id="playlist-preview" class="mb-8"></div>

      <div class="mt-8 flex gap-4 justify-center flex-wrap">
        <button onclick="copyShareLink()" class="px-8 py-4 bg-pink-500 text-white rounded-xl font-bold hover:bg-pink-600 transition">Copy Link 🔗</button>
        <button onclick="location.reload()" class="px-8 py-4 border-2 border-pink-300 rounded-xl font-bold hover:bg-pink-50 transition">Make Another 💐</button>
      </div>
    </section>
  </main>

  <script>
    const flowers = [
      {name: 'Orchid', url: 'https://www.pngall.com/wp-content/uploads/5/Orchid-Flower-PNG-Image.png'},
      {name: 'Rose', url: 'https://www.pngall.com/wp-content/uploads/5/Pink-Rose-Flower-PNG-Image.png'},
      {name: 'Peony', url: 'https://www.pngall.com/wp-content/uploads/5/Peony-Flower-PNG-Image.png'},
      {name: 'Sunflower', url: 'https://www.pngall.com/wp-content/uploads/5/Sunflower-PNG-Image.png'},
      {name: 'Dahlia', url: 'https://www.pngall.com/wp-content/uploads/5/Dahlia-Flower-PNG-Image.png'},
      {name: 'Gerbera', url: 'https://www.pngall.com/wp-content/uploads/5/Gerbera-Flower-PNG-Image.png'},
      {name: 'Lily', url: 'https://www.pngall.com/wp-content/uploads/5/Lily-Flower-PNG-Image.png'},
      {name: 'Daisy', url: 'https://www.pngall.com/wp-content/uploads/5/Daisy-Flower-PNG-Image.png'},
      {name: 'Tulip', url: 'https://www.pngall.com/wp-content/uploads/5/Tulip-Flower-PNG-Image.png'},
      {name: 'Carnation', url: 'https://www.pngall.com/wp-content/uploads/5/Carnation-Flower-PNG-Image.png'},
      {name: 'Hydrangea', url: 'https://www.pngall.com/wp-content/uploads/2016/05/Hydrangea-Flower-PNG.png'},
      {name: 'Anemone', url: 'https://www.pngall.com/wp-content/uploads/5/Anemone-Flower-PNG.png'}
    ];

    let selectedFlowers = [];
    const greeneryOptions = [
      'https://www.pngall.com/wp-content/uploads/5/Green-Grass-PNG-Image.png',
      'https://www.pngall.com/wp-content/uploads/5/Bush-PNG-Image.png',
      'https://www.pngall.com/wp-content/uploads/5/Leaves-PNG-Image.png'
    ];
    let currentGreenery = 0;

    function renderPicker() {
      const picker = document.getElementById('flower-picker');
      picker.innerHTML = '';
      flowers.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'flex-shrink-0 text-center cursor-pointer transition';
        div.innerHTML = `
          <img src="${f.url}" class="w-24 h-24 object-contain mx-auto" alt="${f.name}">
          <p class="mt-2 text-sm text-pink-700">${f.name}</p>
        `;
        div.onclick = () => toggleFlower(i, div);
        picker.appendChild(div);
      });
    }

    function toggleFlower(i, el) {
      const idx = selectedFlowers.indexOf(i);
      if (idx > -1) {
        selectedFlowers.splice(idx, 1);
        el.classList.remove('selected');
      } else if (selectedFlowers.length < 10) {
        selectedFlowers.push(i);
        el.classList.add('selected');
      } else {
        alert("You can pick max 10 blooms!");
        return;
      }
      document.getElementById('selected-count').textContent = selectedFlowers.length;
      document.getElementById('generate').disabled = selectedFlowers.length < 6 || selectedFlowers.length > 10;
      renderBouquet();
    }

    function renderBouquet(isPreview = false) {
      const container = isPreview ? document.getElementById('preview-bouquet') : document.getElementById('flowers-container');
      if (!container) return;
      container.innerHTML = '';

      const greeneryImg = document.createElement('img');
      greeneryImg.className = 'greenery';
      greeneryImg.src = greeneryOptions[currentGreenery];
      container.appendChild(greeneryImg);

      selectedFlowers.forEach((idx, pos) => {
        const f = flowers[idx];
        const img = document.createElement('img');
        img.src = f.url;
        img.className = 'flower-img';
        img.style.left = `${35 + (pos % 4) * 12 + Math.random() * 8}%`;
        img.style.top = `${10 + Math.floor(pos / 4) * 15 + Math.random() * 10}%`;
        img.style.transform = `rotate(${Math.random() * 24 - 12}deg)`;
        img.style.zIndex = pos + 1;
        container.appendChild(img);
      });
    }

    function changeGreenery() {
      currentGreenery = (currentGreenery + 1) % greeneryOptions.length;
      renderBouquet();
    }

    document.getElementById('include-playlist').onchange = e => {
      document.getElementById('playlist-options').classList.toggle('hidden', !e.target.checked);
    };

    function encodeShareData() {
      const data = {
        flowers: selectedFlowers,
        greenery: currentGreenery,
        playlist: document.getElementById('include-playlist').checked ? {
          url: document.getElementById('playlist-url').value,
          cover: document.getElementById('playlist-cover').value
        } : null,
        card: document.getElementById('include-card').checked ? {
          recipient: document.getElementById('recipient').value,
          message: document.getElementById('message').value
        } : null
      };
      return btoa(JSON.stringify(data));
    }

    function generateBouquet() {
      if (selectedFlowers.length < 6 || selectedFlowers.length > 10) {
        alert('Please select between 6 and 10 flowers!');
        return;
      }

      const shareCode = encodeShareData();
      const shareUrl = `${window.location.origin}${window.location.pathname}?b=${shareCode}`;

      renderBouquet(true);

      const envelopeContainer = document.getElementById('envelope-container');
      envelopeContainer.innerHTML = '';

      if (document.getElementById('include-card').checked) {
        const recipient = document.getElementById('recipient').value || 'Dear Friend';
        const message = document.getElementById('message').value || 'With love ♥';

        const envelopeHTML = `
          <div class="envelope" onclick="this.classList.toggle('opened')">
            <div class="envelope-outer">
              <div class="envelope-flap">📬 Click to open</div>
              <div class="card-content">
                <div class="card-recipient">${recipient}</div>
                <div class="card-message">${message}</div>
              </div>
            </div>
          </div>
        `;
        envelopeContainer.innerHTML = envelopeHTML;
      }

      const playlistPreview = document.getElementById('playlist-preview');
      playlistPreview.innerHTML = '';

      if (document.getElementById('include-playlist').checked) {
        const playlistUrl = document.getElementById('playlist-url').value;
        if (playlistUrl) {
          let embedUrl = '';
          if (playlistUrl.includes('spotify')) {
            const playlistId = playlistUrl.split('/').pop().split('?')[0];
            embedUrl = `https://open.spotify.com/embed/playlist/${playlistId}`;
          } else if (playlistUrl.includes('music.apple')) {
            embedUrl = `<p class="text-gray-600">🎵 Playlist: <a href="${playlistUrl}" target="_blank" class="text-pink-500 underline">Open in Apple Music</a></p>`;
          }

          if (embedUrl.includes('http')) {
            playlistPreview.innerHTML = `
              <div class="playlist-section">
                <h4 class="font-bold text-pink-700 mb-4">🎵 Curated Playlist</h4>
                <iframe src="${embedUrl}" width="100%" height="380" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
              </div>
            `;
          } else {
            playlistPreview.innerHTML = embedUrl;
          }
        }
      }

      window.history.pushState({}, '', shareUrl);
      document.getElementById('preview').classList.remove('hidden');
      window.scrollTo({ top: document.getElementById('preview').offsetTop, behavior: 'smooth' });
    }

    function copyShareLink() {
      const shareUrl = window.location.href;
      navigator.clipboard.writeText(shareUrl).then(() => {
        alert('✨ Link copied to clipboard! Share your digital bouquet!');
      });
    }

    function loadFromShare(shareCode) {
      try {
        const data = JSON.parse(atob(shareCode));
        selectedFlowers = data.flowers;
        currentGreenery = data.greenery;

        if (data.card) {
          document.getElementById('include-card').checked = true;
          document.getElementById('recipient').value = data.card.recipient || '';
          document.getElementById('message').value = data.card.message || '';
          document.getElementById('card-options').classList.remove('hidden');
        }

        if (data.playlist) {
          document.getElementById('include-playlist').checked = true;
          document.getElementById('playlist-url').value = data.playlist.url || '';
          document.getElementById('playlist-cover').value = data.playlist.cover || '';
          document.getElementById('playlist-options').classList.remove('hidden');
        }

        document.getElementById('selected-count').textContent = selectedFlowers.length;
        renderBouquet();
        generateBouquet();
      } catch (e) {
        console.error('Failed to load shared bouquet:', e);
      }
    }

    window.onload = () => {
      renderPicker();
      renderBouquet();

      const params = new URLSearchParams(window.location.search);
      if (params.has('b')) {
        loadFromShare(params.get('b'));
      }
    };
  </script>
</body>
</html>
